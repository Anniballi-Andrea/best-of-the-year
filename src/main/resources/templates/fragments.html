<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:fragment="title(title)" th:text="${title}" />

        <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    </th:block>
</head>

<body>

                            </div>
                            <div>
                                <a class="btn btn-primary mt-2 mx-2 px-4" href="/songs">Songs</a>
                            </div>
                        </div>

                    </div>
                </div>

    <main>

    </main>

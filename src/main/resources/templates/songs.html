<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments :: title(|Best of the year by ${name}|)}" />
    <th:block th:replace="~{fragments :: style}"></th:block>
</head>

<body>
    <header>
        <th:block th:replace="~{fragments :: header}">

        </th:block>

    </header>

    <main>

        <div class="container">
            <div class="row mt-5">
                <div class="col-12 d-flex justify-content-center mt-5 ">
                    <h1>Best Songs</h1>
                </div>
            </div>
        </div>
        <div class="row d-flex justify-content-center">
            <div class="col-4">
                <th:block th:each="song : ${songList}">
                    <div class="d-flex justify-content-center border border-dark pt-3 pb-3">
                        <a class="text-decoration-none text-dark" th:href="@{/songs/{id}(id=${song.id})}">
                            <h3>[[*{song.title}]]</h3>
                        </a>
                    </div>
            </div>
        </div>

        </th:block>


    </main>

    <footer>
        <th:block th:replace="~{fragments :: footer}"></th:block>

    </footer>
</body>
